{% extends 'catalog/base.html' %}
{% block content %}
    <div class="container">
        <div class="row text-start">
            <div class="col-lg-8 col-md-6 col-sm-12">
                <form class="row" method="post" enctype="multipart/form-data">
                    <div class="card mb-4 box-shadow">
                        {% if object %}
                        <h2 class="fw-light mb-4">Редактировать товар</h2>
                        {% else %}
                        <h2 class="fw-light mb-4">Добавить товар</h2>
                        {% endif %}
                        <div class="card-body">
                            {% csrf_token %}
                            {{ form.non_field_errors }}
                            {{ form.as_p }}
                            <button type="submit" class="btn btn-primary">
                                {% if object %}
                                Сохранить изменения
                                {% else %}
                                Добавить товар
                                {% endif %}
                            </button>
                            <a class="p-2 btn btn-success" href="{% url 'catalog:product_list' %}">Отменить</a>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
{% endblock %}
