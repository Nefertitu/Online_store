{% extends 'base.html' %}
{% block content %}
    <div class="container">
        <form method="post">
            {% csrf_token %}
            <div class="row text-start">
                <div class="col-lg-9 col-md-6 col-sm-12">
                    <div class="card mb-4 box-shadow">
                        <div class="card-body">
                            {{ form.as_p }}
                            <button type="submit" class="btn btn-primary">Добавить товар</button>
                        </div>
                    </div>
                </div>
            </div>
        </form>
    </div>
{% endblock %}
